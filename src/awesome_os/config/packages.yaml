        - Meltytech.Shotcut
        - Canva.Canva
      Text Editors:
        - Obsidian.Obsidian
        - Notion.Notion
        - PDFgear.PDFgear
      Dev_tools:
        - Microsoft.WindowsTerminal
        - JetBrains.PyCharm
        - Comfy.ComfyUI-Desktop
        - Docker.DockerDesktop
        - Microsoft.VisualStudioCode
        - MongoDB.Compass.Full
