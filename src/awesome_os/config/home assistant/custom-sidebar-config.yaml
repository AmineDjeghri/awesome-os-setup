##########################################################################################
# Custom Sidebar Configuration
# Optimized for UI, Functionality, and Security
##########################################################################################

# Appearance Settings
title_color: "#4CAF50" # Green title

styles: |
  :host {
    /* No custom colors for icons/text */
  }

js_variables:
  # Update entities
  hacs_updates: sensor.hacs
  core_update: update.home_assistant_core_update
  supervisor_updates: sensor.supervisor_updates
  # Sidebar State
  sidebar_editable: input_boolean.sidebar_editable

partials:
  updates_count: |
    const hacs = parseInt(states(hacs_updates)) || 0;
    const core = is_state(core_update, 'on') ? 1 : 0;
    const supervisor = parseInt(states(supervisor_updates)) || 0;
    return hacs + core + supervisor;

title: |
  [[[
    return "Home Assistant";
  ]]]

sidebar_editable: >
  [[[ return is_state(sidebar_editable, 'on'); ]]]
sidebar_background: var(--sidebar-background-color)

order:
  - item: My Dashboard
    icon: mdi:home
    icon_color: "#4CAF50"
    text_color: "#4CAF50"
    order: 1

  - new_item: true
    item: Cameras
    href: "/my-dashboard/cameras"
    icon: mdi:camera-outline
    icon_color: "#2196F3"
    text_color: "#2196F3"
    order: 2

  - item: energy
    icon: mdi:lightning-bolt
    icon_color: "#f4ff1c"
    text_color: "#f4ff1c"
    order: 3

  - item: map
    icon: mdi:map-outline
    icon_color: "#3F51B5"
    text_color: "#3F51B5"
    order: 4

  - item: Media
    icon: mdi:play-network
    icon_color: "#E91E63"
    text_color: "#E91E63"
    divider: true
    divider_color: "#E91E63"
    order: 5

  - new_item: true
    item: Integrations
    href: "/config/integrations"
    icon: mdi:puzzle
    icon_color: "#1b499f"
    text_color: "#1b499f"
    order: 6

  - new_item: true
    item: Automations
    href: "/config/automation"
    icon: mdi:robot
    icon_color: "#568a46"
    text_color: "#568a46"
    order: 7

  - new_item: true
    item: Apps
    href: "/config/apps"
    icon: mdi:robot
    icon_color: "#ebc14b"
    text_color: "#ebc14b"
    order: 7

  - item: hacs
    icon_color: "#00BCD4"
    text_color: "#00BCD4"
    notification: |
      [[[ @partial updates_count
          return updates_count > 0 ? updates_count : ''; ]]]
    notification_color: "#00BCD4"
    order: 8

  - item: Terminal
    icon: mdi:console
    icon_color: "#009e97"
    text_color: "#009e97"
    order: 9

  - item: File Editor
    icon: mdi:folder-edit
    icon_color: "#DFFFAC"
    text_color: "#DFFFAC"
    order: 10

  - new_item: true
    item: Logs
    href: "/config/logs"
    icon: mdi:math-log
    icon_color: "#9E9E9E"
    text_color: "#9E9E9E"
    order: 11

  - item: activity
    icon_color: "#9E9E9E"
    text_color: "#795548"
    order: 12

  - item: history
    icon_color: "#9E9E9E"
    text_color: "#795548"
    order: 13

  - item: settings
    name: Settings
    icon_color: "#9ab7ff"
    text_color: "#9ab7ff"
    order: 14

  - item: notifications
    icon_color: "#e8ff04"
    text_color: "#e8ff04"
    divider: true
    divider_color: "#e8ff04"
    order: 15

# Hide remaining default items
  - item: To-do lists
    hide: true
  - item: overview
    hide: true
  - item: Aperçu
    hide: true

# Security Restrictions
exceptions:
  - user:
      - "adguard"

    hide:
      - item: integrations
      - item: automations
      - item: energy
      - item: map
      - item: media
      - item: hacs
      - item: Logs
      - item: activity
      - item: history
      - item: Terminal
      - item: File Editor
      - item: settings

    order:
      - item: My Dashboard
        order: 1
      - item: Cameras
        order: 2
