# =============================================================================
# Reusable Workflow — 👷 Quality Check & Tests
# =============================================================================
# Shared by: ci.yml, main-release.yml, dev-release.yml
# Runs pre-commit first, then tests sequentially.
# =============================================================================
name: "👷 Quality Check & Tests"

on:
  workflow_call:

permissions:
  contents: read

jobs:

  pre-commit:
    name: "🧹 Pre-commit"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check Out
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Python Dependencies
        uses: ./.github/actions/install-python-deps

      - name: Run Pre-commit
        id: pre_commit
        shell: bash
        run: |
          echo "::group::Pre-commit output"
          make pre-commit
          echo "::endgroup::"

      - name: Cleanup Artifacts
        if: always()
        uses: ./.github/actions/cleanup-artifacts

  tests:
    name: "🧪 Tests"
    runs-on: ubuntu-latest
    needs: pre-commit
    timeout-minutes: 5
    steps:
      - name: Check Out
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Python Dependencies
        uses: ./.github/actions/install-python-deps

      - name: Run Tests
        id: tests
        shell: bash
        run: |
          echo "::group::Tests output"
          make test
          echo "::endgroup::"

      - name: Cleanup Artifacts
        if: always()
        uses: ./.github/actions/cleanup-artifacts

  integration-ubuntu:
    name: "🐧 Integration Tests (Ubuntu 24.04)"
    runs-on: ubuntu-24.04
    needs: pre-commit
    timeout-minutes: 15
    steps:
      - name: Check Out
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Python Dependencies
        uses: ./.github/actions/install-python-deps

      - name: Run Integration Tests
        id: integration_tests
        shell: bash
        run: |
          echo "::group::Integration tests output"
          make test-integration
          echo "::endgroup::"

      - name: Cleanup Artifacts
        if: always()
        uses: ./.github/actions/cleanup-artifacts
