name: 🐛 Bug Report
description: Report a bug to help us improve
title: "[BUG] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "## Description"
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug in detail
      placeholder: "The issue occurs when..."
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## Steps to Reproduce"
  - type: textarea
    id: steps
    attributes:
      label: Steps
      description: How to reproduce the bug
      placeholder: "1. Step one\n2. Step two\n3. Step three"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "What should happen..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: "What actually happened..."
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## Environment"
  - type: dropdown
    id: python_version
    attributes:
      label: Python version
      options:
        - "3.12"
        - "3.13"
        - "3.14"
        - "Other"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      placeholder: "Any screenshots, error messages, or other info"
