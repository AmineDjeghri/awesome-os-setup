site_name: Awesome OS Setup
site_description: Documentation
site_author: Amine DJEGHRI
docs_dir: .
# site_url: #TODO: Fill when deployment CI added
#site_dir: public
#repo_url:
#edit_uri: blob/main/docs/


theme:

  name: "material" # https://squidfunk.github.io/mkdocs-material/getting-started/
  language: en
  logo: docs/images/logo.png
  favicon: docs/images/logo.png
  features: # https://squidfunk.github.io/mkdocs-material/setup/
    - search.suggest
    - search.highlight
    - search.share
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    #    - navigation.sections
    - navigation.path
    - navigation.indexes
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.code.annotate
  palette:
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
plugins:
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src, docs]
  - gen-files:
      scripts:
        - scripts/gen_doc_stubs.py
        - scripts/gen_example_pages.py
  - search
  - same-dir
  - mermaid2
  - literate-nav:
      nav_file: SUMMARY.md
  - exclude:
      glob:
        - node_modules/**
        - .venv/**
        - docker_data/**
        - dist/**
        - reports/**
        - bin/**
        - docker/**
        - .idea/**
        - .github/**
        - .ruff_cache/**
        - .deepeval/**
        - .deepteam/**
        - .changelog/**
        - docs/examples/data/sample.*

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables

nav:
  - Home:
    - Overview: README.md
    - Documentation: docs/
  - Examples: docs/examples/
  - API Reference: package/
  - Changelog: CHANGELOG.md
  - Contributing: CONTRIBUTING.md
